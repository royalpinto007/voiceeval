name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: pip install -e ".[dev]"
      - run: pytest -q

      # The bundled calls are the documentation, so CI asserts they still say what they claim.
      # A checker that stops firing is indistinguishable from a clean bill of health, which is
      # the whole failure this library exists to prevent.
      - name: A clean call passes
        run: voiceeval check fixtures/good_call.json --strict

      - name: The misheard call must fail
        run: |
          if voiceeval check fixtures/misheard_call.json --strict; then
            echo "::error::misheard_call.json passed. The mis-hearing check has regressed, and a
            call that silently refunds the wrong amount now scores clean."
            exit 1
          fi
          echo "correctly failed, as it must"
